# 🔒 App Routes Configuration
# Extracted from app.conf for SSL inclusion
# MVP Vídeos TécnicoCursos - Route definitions

error_page 404 /404.html;
error_page 500 502 503 504 /50x.html;

# =====================================
# Static Assets & Uploads
# =====================================
location /uploads/ {
    alias /var/www/uploads/;
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header X-Content-Type-Options nosniff;
    
    location ~* \.(php|py|js|pl|sh|cgi)$ {
        deny all;
    }
}

location /_next/static/ {
    proxy_pass http://nextjs_backend;
    expires 1y;
    add_header Cache-Control "public, immutable";
    
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    
    gzip on;
    gzip_types text/css application/javascript;
}

location /_next/image {
    proxy_pass http://nextjs_backend;
    
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $server_name;
    proxy_set_header Connection "";
    proxy_set_header Accept-Encoding "";
    
    expires 1y;
    add_header Cache-Control "public, immutable";
    
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
    proxy_connect_timeout 30s;
    
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    proxy_busy_buffers_size 8k;
}

# =====================================
# API Routes with Rate Limiting
# =====================================

# Authentication endpoints (strict rate limiting)
location ~* ^/api/(auth|login|register|reset-password) {
    limit_req zone=auth burst=10 nodelay;
    limit_req_status 429;
    
    proxy_pass http://nextjs_backend;
    include /etc/nginx/snippets/proxy-headers.conf;
    
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}

# Upload endpoints (moderate rate limiting)
location ~* ^/api/(upload|pptx/upload) {
    limit_req zone=upload burst=5 nodelay;
    limit_req_status 429;
    
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_connect_timeout 60s;
    
    proxy_pass http://nextjs_backend;
    include /etc/nginx/snippets/proxy-headers.conf;
    
    client_body_buffer_size 1M;
    client_max_body_size 100M;
}

# Render endpoints (moderate rate limiting)
location ~* ^/api/render {
    limit_req zone=render burst=20 nodelay;
    limit_req_status 429;
    
    proxy_pass http://nextjs_backend;
    include /etc/nginx/snippets/proxy-headers.conf;
    
    proxy_read_timeout 120s;
}

# General API endpoints
location /api/ {
    limit_req zone=api burst=30 nodelay;
    limit_req_status 429;
    
    proxy_pass http://nextjs_backend;
    include /etc/nginx/snippets/proxy-headers.conf;
}

# =====================================
# Health Checks (no rate limiting)
# =====================================
location = /api/health {
    access_log off;
    proxy_pass http://nextjs_backend;
    include /etc/nginx/snippets/proxy-headers.conf;
    
    proxy_read_timeout 10s;
    proxy_send_timeout 10s;
}

location = /api/health/ready {
    access_log off;
    proxy_pass http://nextjs_backend;
    include /etc/nginx/snippets/proxy-headers.conf;
    proxy_read_timeout 5s;
}

location = /api/health/live {
    access_log off;
    proxy_pass http://nextjs_backend;
    include /etc/nginx/snippets/proxy-headers.conf;
    proxy_read_timeout 5s;
}

# =====================================
# Metrics (secured)
# =====================================
location /api/metrics {
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    allow 127.0.0.1;
    deny all;
    
    proxy_pass http://nextjs_backend;
    include /etc/nginx/snippets/proxy-headers.conf;
}

# =====================================
# WebSocket Support (Collaboration)
# =====================================
location /ws/ {
    proxy_pass http://nextjs_backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    proxy_read_timeout 7200s;
    proxy_send_timeout 7200s;
}

# Socket.io collaboration server
location /socket.io/ {
    proxy_pass http://app:3001;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    proxy_read_timeout 7200s;
    proxy_send_timeout 7200s;
}

# =====================================
# Default route (Next.js app)
# =====================================
location / {
    proxy_pass http://nextjs_backend;
    include /etc/nginx/snippets/proxy-headers.conf;
    
    location ~* \.(ico|css|js|gif|jpe?g|png|svg|woff|woff2|ttf|eot)$ {
        expires 1M;
        add_header Cache-Control "public, immutable";
    }
}

# =====================================
# Security: Block common attacks
# =====================================
location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
}

location ~* \.(bak|backup|old|orig|save|swo|swp|tmp)$ {
    deny all;
    access_log off;
    log_not_found off;
}

location ~* (wp-admin|wp-content|wp-includes|xmlrpc\.php|wp-login\.php) {
    deny all;
    access_log off;
    log_not_found off;
}
