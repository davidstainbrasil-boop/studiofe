name: CI/CD Pipeline

on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main, staging]

env:
  NODE_VERSION: '20'

jobs:
  # Job 1: Lint & Type Check
  lint-and-typecheck:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: estudio_ia_videos/package-lock.json

      - name: Install dependencies
        working-directory: estudio_ia_videos
        run: npm ci --legacy-peer-deps

      - name: Validate production domain consistency
        working-directory: estudio_ia_videos
        run: npm run check:production-domain

      - name: Run ESLint
        working-directory: estudio_ia_videos
        run: npm run lint

      - name: Run Type Check
        working-directory: estudio_ia_videos
        run: npm run type-check

  # Job 2: Build
  build:
    name: 🏗️ Build Application
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: estudio_ia_videos/package-lock.json

      - name: Install dependencies
        working-directory: estudio_ia_videos
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma Client
        working-directory: estudio_ia_videos
        run: npx prisma generate

      - name: Build Next.js application
        working-directory: estudio_ia_videos
        run: npm run build
        env:
          SKIP_ENV_VALIDATION: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: estudio_ia_videos/.next
          retention-days: 7

  # Job 3: Security Audit
  security:
    name: 🔐 Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run npm audit
        working-directory: estudio_ia_videos
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Run dependency check
        working-directory: estudio_ia_videos
        run: npx depcheck
        continue-on-error: true

  # Job 4: Deploy to Staging
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel (Staging)
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: estudio_ia_videos
          scope: ${{ secrets.VERCEL_ORG_ID }}

  # Job 5: Deploy to Production
  deploy-production:
    name: 🌐 Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel (Production)
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: estudio_ia_videos
          scope: ${{ secrets.VERCEL_ORG_ID }}

      - name: Validate production assets
        working-directory: estudio_ia_videos
        run: node check-assets.mjs https://cursostecno.com.br

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Production deployment successful!"
          echo "URL: ${{ steps.deploy.outputs.url }}"
